        type_basic_data:
          url: jdbc:mysql://localhost:3306/type_basic_data?serverTimezone=GMT%2B8
          username: root
          password: qq16281091
          driver-class-name: com.mysql.cj.jdbc.Driver

  redis:
    host: 127.0.0.1
    port: 6379
    password: qq16281091
    database: 0
    timeout: 3000ms
    lettuce:
      pool:
        max-active: 8
        max-idle: 8
        min-idle: 0
        max-wait: 3000ms
  
  cache:
