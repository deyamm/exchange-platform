      grace-destroy: true

      datasource:
        sys_app_analytics:
          url: jdbc:mysql://localhost:3306/sys_app_analytics?serverTimezone=GMT%2B8
          username: root
          password: qq16281091
          driver-class-name: com.mysql.cj.jdbc.Driver
        
        basic_info:
          url: jdbc:mysql://localhost:3306/basic_info?serverTimezone=GMT%2B8
          username: root
          password: qq16281091
